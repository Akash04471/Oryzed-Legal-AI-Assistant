<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Oryzed Legal AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/auth.css" />
</head>

<body>
    <canvas id="authBgCanvas" aria-hidden="true"></canvas>
    <div class="auth-noise" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-one" aria-hidden="true"></div>
    <div class="auth-orb auth-orb-two" aria-hidden="true"></div>

    <div class="auth-stage">
        <main class="auth-shell" role="main">
            <div class="card-grid-overlay" aria-hidden="true"></div>

            <div class="brand parallax-layer" data-depth="10">
                <img src="/static/Oryzed_Logo.png" alt="Oryzed Logo" class="brand-logo" />
                <div class="brand-name">ORYZED</div>
            </div>

            <div class="auth-tagline parallax-layer" data-depth="8">Create Isolated Workspace</div>
            <h1 class="auth-title parallax-layer" data-depth="9">Create <span class="accent">Account</span></h1>
            <p class="auth-subtitle parallax-layer" data-depth="6">Sign up to keep research sessions isolated by user, while preserving your own legal research history and task flow.</p>

            {% if error %}
            <div class="auth-error" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="/signup" class="auth-form" autocomplete="off">
                <label class="auth-label" for="username">Username</label>
                <div class="auth-input-wrap">
                    <input class="auth-input" id="username" name="username" type="text" minlength="3" placeholder="Choose username" required />
                </div>

                <label class="auth-label" for="email">Email</label>
                <div class="auth-input-wrap">
                    <input class="auth-input" id="email" name="email" type="email" placeholder="Enter email" required />
                </div>

                <label class="auth-label" for="password">Password</label>
                <div class="auth-input-wrap">
                    <input class="auth-input" id="password" name="password" type="password" minlength="8" placeholder="Create password" required />
                </div>

                <label class="auth-label" for="confirm_password">Confirm password</label>
                <div class="auth-input-wrap">
                    <input class="auth-input" id="confirm_password" name="confirm_password" type="password" minlength="8" placeholder="Repeat password" required />
                </div>

                <button class="auth-btn" type="submit">Sign Up</button>
            </form>

            <p class="auth-alt">Already have an account? <a href="/login">Login</a></p>
            <p class="auth-alt">By using Oryzed, you agree to the <a href="/terms" target="_blank" rel="noopener">Terms and Conditions</a>.</p>
        </main>
    </div>

    <script src="/static/auth.js" defer></script>
</body>

</html>
