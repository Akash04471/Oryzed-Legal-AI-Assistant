<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGAL AI – Judicial Cosmos Assistant</title>
    
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/all.min.css') }}?v=20260319">
    
    <!-- MAIN STYLES -->
    <link rel="stylesheet" href="{{ url_for('static', filename='legal_style_final.css') }}">
    
    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/purify.min.js') }}"></script>
</head>

<body class="judicial-cosmos">

<!-- ═══════════════════════════════════════════════════════════
     CUSTOM CURSOR (Desktop Only)
════════════════════════════════════════════════════════════ -->
<div class="cursor-outer" id="cursorOuter"></div>
<div class="cursor-inner" id="cursorInner"></div>

<!-- ═══════════════════════════════════════════════════════════
     CINEMATIC INTRO OVERLAY
════════════════════════════════════════════════════════════ -->
<div class="intro-overlay" id="introOverlay">
    <div class="intro-content">
        <svg class="intro-scales" viewBox="0 0 200 200" width="120" height="120">
            <defs>
                <linearGradient id="scalesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:1" />
                </linearGradient>
            </defs>
            <!-- Balance beam -->
            <line x1="40" y1="100" x2="160" y2="100" stroke="url(#scalesGradient)" stroke-width="3"/>
            <!-- Center post -->
            <line x1="100" y1="60" x2="100" y2="100" stroke="url(#scalesGradient)" stroke-width="3"/>
            <!-- Left scale -->
            <circle cx="60" cy="100" r="3" fill="#c9a84c"/>
            <line x1="60" y1="100" x2="60" y2="120" stroke="#c9a84c" stroke-width="2"/>
            <rect x="45" y="120" width="30" height="15" fill="none" stroke="#c9a84c" stroke-width="2" rx="2"/>
            <!-- Right scale -->
            <circle cx="140" cy="100" r="3" fill="#4fc3f7"/>
            <line x1="140" y1="100" x2="140" y2="120" stroke="#4fc3f7" stroke-width="2"/>
            <rect x="125" y="120" width="30" height="15" fill="none" stroke="#4fc3f7" stroke-width="2" rx="2"/>
            <!-- Top point -->
            <circle cx="100" cy="60" r="4" fill="url(#scalesGradient)"/>
        </svg>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     ANIMATED BACKGROUND ATMOSPHERE
════════════════════════════════════════════════════════════ -->
<div class="cosmic-background">
    <!-- Nebula orbs -->
    <div class="nebula-orb nebula-orb-1"></div>
    <div class="nebula-orb nebula-orb-2"></div>
    <div class="nebula-orb nebula-orb-3"></div>
    
    <!-- Star field -->
    <div class="star-field" id="starField"></div>
    
    <!-- Scan lines overlay -->
    <div class="scan-lines"></div>
    
    <!-- Corner filigree decorations -->
    <svg class="corner-decoration corner-tl" viewBox="0 0 100 100" width="100" height="100">
        <path d="M0,0 L0,40 Q0,0 40,0 L0,0 M10,0 L10,30 Q10,10 30,10 L10,0" 
              fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    </svg>
    <svg class="corner-decoration corner-tr" viewBox="0 0 100 100" width="100" height="100">
        <path d="M100,0 L100,40 Q100,0 60,0 L100,0 M90,0 L90,30 Q90,10 70,10 L90,0" 
              fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    </svg>
    <svg class="corner-decoration corner-bl" viewBox="0 0 100 100" width="100" height="100">
        <path d="M0,100 L0,60 Q0,100 40,100 L0,100 M10,100 L10,70 Q10,90 30,90 L10,100" 
              fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    </svg>
    <svg class="corner-decoration corner-br" viewBox="0 0 100 100" width="100" height="100">
        <path d="M100,100 L100,60 Q100,100 60,100 L100,100 M90,100 L90,70 Q90,90 70,90 L90,100" 
              fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="0.5"/>
    </svg>
</div>

<!-- ═══════════════════════════════════════════════════════════
     MAIN APPLICATION CONTAINER
════════════════════════════════════════════════════════════ -->
<div class="app-container">

    <!-- ══════════════════ HEADER ══════════════════ -->
    <header class="cosmic-header">
        <div class="header-left">
            <svg class="scales-icon" id="scalesIcon" viewBox="0 0 200 200" width="40" height="40">
                <defs>
                    <linearGradient id="headerScalesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <g class="scales-pendulum">
                    <line x1="40" y1="100" x2="160" y2="100" stroke="url(#headerScalesGrad)" stroke-width="4"/>
                    <line x1="100" y1="60" x2="100" y2="100" stroke="url(#headerScalesGrad)" stroke-width="4"/>
                    <circle cx="60" cy="100" r="4" fill="#c9a84c"/>
                    <line x1="60" y1="100" x2="60" y2="125" stroke="#c9a84c" stroke-width="3"/>
                    <rect x="42" y="125" width="36" height="20" fill="none" stroke="#c9a84c" stroke-width="3" rx="3"/>
                    <circle cx="140" cy="100" r="4" fill="#4fc3f7"/>
                    <line x1="140" y1="100" x2="140" y2="125" stroke="#4fc3f7" stroke-width="3"/>
                    <rect x="122" y="125" width="36" height="20" fill="none" stroke="#4fc3f7" stroke-width="3" rx="3"/>
                    <circle cx="100" cy="60" r="5" fill="url(#headerScalesGrad)"/>
                </g>
            </svg>
        </div>
        
        <h1 class="cosmic-title">LEGAL AI</h1>
        
        <div class="header-right">
            <button class="btn-new-consultation" id="btnNewConsultation">
                <i class="fas fa-plus"></i>
                <span>New Consultation</span>
            </button>
        </div>
        
        <div class="header-border"></div>
    </header>

    <!-- ══════════════════ SIDEBAR ══════════════════ -->
    <aside class="cosmic-sidebar" id="cosmicSidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">CONSULTATIONS</h2>
            <button class="sidebar-close" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="sidebar-sessions" id="sidebarSessions">
            <!-- Sessions will be dynamically inserted here -->
        </div>
    </aside>

    <!-- Mobile hamburger menu -->
    <button class="hamburger-menu" id="hamburgerMenu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- ══════════════════ MAIN CHAT AREA ══════════════════ -->
    <main class="cosmic-main">
        <div class="chat-container" id="chatContainer">
            <!-- Empty state -->
            <div class="empty-state" id="emptyState">
                <svg class="empty-scales" viewBox="0 0 200 200" width="140" height="140">
                    <defs>
                        <linearGradient id="emptyScalesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.6" />
                            <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.6" />
                        </linearGradient>
                    </defs>
                    <line x1="40" y1="100" x2="160" y2="100" stroke="url(#emptyScalesGrad)" stroke-width="3"/>
                    <line x1="100" y1="60" x2="100" y2="100" stroke="url(#emptyScalesGrad)" stroke-width="3"/>
                    <circle cx="60" cy="100" r="3" fill="#c9a84c" opacity="0.6"/>
                    <line x1="60" y1="100" x2="60" y2="120" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
                    <rect x="45" y="120" width="30" height="15" fill="none" stroke="#c9a84c" stroke-width="2" rx="2" opacity="0.6"/>
                    <circle cx="140" cy="100" r="3" fill="#4fc3f7" opacity="0.6"/>
                    <line x1="140" y1="100" x2="140" y2="120" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
                    <rect x="125" y="120" width="30" height="15" fill="none" stroke="#4fc3f7" stroke-width="2" rx="2" opacity="0.6"/>
                    <circle cx="100" cy="60" r="4" fill="url(#emptyScalesGrad)"/>
                </svg>
                
                <h2 class="empty-title">Welcome to Legal AI</h2>
                <p class="empty-subtitle">Your professional legal assistant powered by advanced AI</p>
                
                <div class="prompt-chips">
                    <div class="prompt-chip">Constitutional Law Queries</div>
                    <div class="prompt-chip">Contract Analysis</div>
                    <div class="prompt-chip">Case Law Research</div>
                    <div class="prompt-chip">Legal Procedures</div>
                </div>
            </div>
            
            <!-- Messages will be inserted here -->
            <div class="messages-area" id="messagesArea"></div>
        </div>
    </main>

    <!-- ══════════════════ CHAT INPUT ══════════════════ -->
    <div class="cosmic-input-container">
        <div class="input-wrapper">
            <button class="btn-voice" disabled title="Voice input (coming soon)">
                <i class="fas fa-microphone"></i>
            </button>
            
            <textarea 
                class="cosmic-textarea" 
                id="cosmicTextarea" 
                placeholder="Describe your legal query in detail..."
                rows="1"
                maxlength="10000"></textarea>
            
            <button class="btn-send" id="btnSend" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        
        <div class="char-counter" id="charCounter" style="display: none;">
            <span id="charCount">0</span> / 10000
        </div>
    </div>

</div>

<!-- ═══════════════════════════════════════════════════════════
     DISCLAIMER BANNER
════════════════════════════════════════════════════════════ -->
<div class="disclaimer-banner" id="disclaimerBanner">
    <i class="fas fa-balance-scale"></i>
    <span>For informational purposes only — not legal advice</span>
    <button class="disclaimer-close" id="disclaimerClose">
        <i class="fas fa-times"></i>
    </button>
</div>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════════════ -->
<script src="{{ url_for('static', filename='legal_app.js') }}"></script>

</body>
</html>
